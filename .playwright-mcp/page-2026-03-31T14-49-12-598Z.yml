        - generic [ref=e44]:
          - heading "Severe Thunderstorms and Heavy Rainfall in the Ohio Valley and Great Lakes; Winter Weather in the Northern Tier" [level=1] [ref=e45]
          - paragraph [ref=e46]:
            - text: A slow moving front extending from the Great Lakes region into the Plains will bring snow, wintry mix, and ice accumulation north of the front from the Upper Midwest into New England, and severe weather and heavy rain south of the front. Scattered severe thunderstorms with damaging gusts, severe hail, and heavy rain are expected across parts of the Great Lakes/Midwest through tonight.
